title: Cutsize and balance
footer: learn_partitioning — 01 cutsize balance
slides:
- type: title
  title: Cutsize and balance
  subtitle: Cutsize adds the weights of edges that cross the cut
  notes: Cutsize adds the weights of edges that cross the cut. Balance asks whether
    the two parts are roughly the same size. On the starter graph, the bad seed AE
    versus BCD cuts both heavy edges and scores cutsize twelve with sizes two and
    three. The golden ABC versus DE drops the cut to three with sizes three and two.
    You will compute both numbers every time you look at a bipartition.
- type: bullets
  title: The idea
  bullets:
  - For every edge, if the endpoints sit in different parts, add its weight to the
    cut
  - Balance ratio is the smaller part size over the larger
  - Never celebrate a zero cut that parks every node on one side
  - <!-- algorithm-walkthrough -->
  notes: 'For every edge, if the endpoints sit in different parts, add its weight
    to the cut. Balance ratio is the smaller part size over the larger. Never celebrate
    a zero cut that parks every node on one side—that is not a usable partition.


    <!-- algorithm-walkthrough -->'
- type: image
  title: Same graph, two bipartitions
  image: assets/steps/01-graph.png
  caption: Same graph, two bipartitions
  notes: TINY_GRAPH has five cells. Partition quality is measured by cutsize (sum
    of cut edge weights) and balance (how even the two sides are).
- type: image
  title: 'Bad seed: cutsize 12'
  image: assets/steps/02-bad-seed.png
  caption: 'Bad seed: cutsize 12'
  notes: Seed AE|BCD cuts both heavy edges A–B(5) and D–E(5). Cutsize is 12 — a terrible
    wire cost even though the split is legal.
- type: image
  title: 'Bad seed balance: ratio 2/3'
  image: assets/steps/03-bad-balance.png
  caption: 'Bad seed balance: ratio 2/3'
  notes: Side sizes are 2 vs 3, so balance ratio = 2/3 and imbalance |2−3|/5 = 0.2.
    The split is moderately balanced — cutsize, not balance, is the problem.
- type: image
  title: 'Golden ABC|DE: cutsize 3'
  image: assets/steps/04-golden.png
  caption: 'Golden ABC|DE: cutsize 3'
  notes: Golden bipartition ABC|DE keeps A–B and D–E internal. Only weak bridges C–D(2)
    and C–E(1) are cut — cutsize drops to 3 with the same 2/3 ratio.
- type: image
  title: Cutsize + balance literacy
  image: assets/steps/05-takeaway.png
  caption: Cutsize + balance literacy
  notes: 'Two partitions can share the same balance but differ wildly in cut. EDA
    flows optimize cut under balance constraints — never balance alone.


    <!-- /algorithm-walkthrough -->'
