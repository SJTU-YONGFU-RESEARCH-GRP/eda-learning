title: Welcome to clustering for EDA
footer: learn_clustering — 00 intro
slides:
- type: title
  title: Welcome to clustering for EDA
  subtitle: Physical design engines almost never optimize a flat million-cell problem
    in one shot
  notes: Physical design engines almost never optimize a flat million-cell problem
    in one shot. They cluster, coarsen, and refine. This course teaches those algorithms
    as full implementations on tiny graphs—so you build literacy for partitioning,
    placement, and multilevel flows later.
- type: bullets
  title: What you’ll build
  bullets:
  - Fiduccia–Mattheyses
  - Then multilevel and hypergraph models, then congestion- and timing-aware objectives
  - One algorithm per lab
  - Full implementations at course scale
  notes: You’ll move through foundations—affinity and greedy merges—then classic methods
    like label propagation, spectral bisection, Kernighan–Lin, and Fiduccia–Mattheyses.
    Then multilevel and hypergraph models, then congestion- and timing-aware objectives.
    One algorithm per lab. Full implementations at course scale—not production throughput,
    but complete and correct on the scoped instances.
- type: bullets
  title: Stable module ids
  bullets:
  - Module folders use hierarchical ids
  - That way we can add algorithms later without renumbering everything
  - Odd slots are reserved so inserts stay clean
  - Treat published ids as stable keys; display order lives in the module index
  notes: 'Module folders use hierarchical ids: section, then algorithm slot—like module
    two dash zero five for Kernighan–Lin. That way we can add algorithms later without
    renumbering everything. Odd slots are reserved so inserts stay clean. Treat published
    ids as stable keys; display order lives in the module index.'
- type: bullets
  title: Two tracks
  bullets:
  - Every lab module offers two practice tracks
  - 'Track A is implement: code the algorithm, run tiny graphs, report metrics'
  - Track B is the browser lab shelf
  - A good rhythm is browser first for the idea, then implement to harden it
  - Intro and wrap modules have no lab
  notes: 'Every lab module offers two practice tracks. Track A is implement: code
    the algorithm, run tiny graphs, report metrics. Track B is the browser lab shelf—each
    algorithm has a shipped lab with a starter example and challenges. A good rhythm
    is browser first for the idea, then implement to harden it. Intro and wrap modules
    have no lab.'
- type: bullets
  title: How to move
  bullets:
  - For each module
  - Keep cutsize, balance, and objective as your habit
  - When this intro checklist is done
  notes: For each module, read the README for outcomes, pick a track—or both—then
    work the checklist. Keep cutsize, balance, and objective as your habit. When this
    intro checklist is done, continue to affinity metrics—the shared scoring language
    every later algorithm will use.
