title: Clustering path complete
footer: learn_clustering — 00 wrap
slides:
- type: title
  title: Clustering path complete
  subtitle: You’ve walked the clustering path
  notes: You’ve walked the clustering path—from affinity and greedy merges, through
    classic refinement and multilevel hypergraph models, into congestion- and timing-aware
    objectives, plus an offline compare habit. This wrap names what you can do now
    and where to go next.
- type: bullets
  title: What you can do now
  bullets:
  - You can implement and evaluate the main clustering algorithms on tiny instances
  - You can explain cutsize versus balance trade-offs, when a graph model is enough
  - You can refine a partition with KL or FM, and you know why multilevel V-cycles
    exist
  - You are not shipping a foundry tool, you are building algorithm literacy for the
    PD stack
  notes: You can implement and evaluate the main clustering algorithms on tiny instances.
    You can explain cutsize versus balance trade-offs, when a graph model is enough,
    and when a hyperedge model is required. You can refine a partition with KL or
    FM, and you know why multilevel V-cycles exist. You are not shipping a foundry
    tool—you are building algorithm literacy for the PD stack.
- type: bullets
  title: Close the gaps
  bullets:
  - If you mainly watched browser labs
  - If you mainly coded, re-open the visual labs and clear a few challenges
  - Either track works for self-study
  notes: If you mainly watched browser labs, go back and finish at least one full
    implementation in foundations and one in refinement. If you mainly coded, re-open
    the visual labs and clear a few challenges. Either track works for self-study;
    both together stick best before partitioning or floorplanning.
- type: bullets
  title: Next
  bullets:
  - Complete the quiz for this part
  - Natural next steps are learn partitioning, for cut-focused bipartition and multiway
    work
  notes: Natural next steps are learn partitioning—for cut-focused bipartition and
    multiway work—and learn floorplanning, where clustered blocks become shapes and
    whitespace. Congestion and placement courses will reuse the same affinity and
    multilevel instincts. Pick one path and keep your tiny-graph harness—you’ll reuse
    the I/O format.
- type: bullets
  title: Your turn
  bullets:
  - Review the wrap checklist
  - Name three algorithms and one strength each
  - Say which model you’d use for a netlist with huge high-fanout nets
  - When you’re ready, take the short quiz, then open the next course README
  notes: Review the wrap checklist. Name three algorithms and one strength each. Say
    which model you’d use for a netlist with huge high-fanout nets. When you’re ready,
    take the short quiz, then open the next course README.
