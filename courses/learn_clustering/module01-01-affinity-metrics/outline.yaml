title: Affinity metrics
footer: learn_clustering — 01 affinity metrics
slides:
- type: title
  title: Affinity metrics
  subtitle: Before you merge cells or coarsen a netlist, you need a score that says
    these two should stay together
  notes: Before you merge cells or coarsen a netlist, you need a score that says these
    two should stay together. That score is affinity. In this module you’ll compare
    plain edge weight with shared-neighbor scoring on the same tiny graph—and watch
    who wants to merge first.
- type: image
  title: Start with a tiny weighted graph
  image: assets/steps/01-raw-graph.png
  caption: Start with a tiny weighted graph
  notes: Five cells A through E with edge weights. Heavy edges A–B and D–E both weigh
    five; the bridge through C is weaker. Affinity will decide which pairs want to
    cluster first.
- type: image
  title: Edge-weight affinity ranks pairs
  image: assets/steps/02-edge-rank.png
  caption: Edge-weight affinity ranks pairs
  notes: Pure edge-weight affinity just sorts existing edges. A–B and D–E tie at five;
    tie-break puts A–B first. That ranking is the simplest merge priority.
- type: image
  title: Shared neighbors boost A–B
  image: assets/steps/03-shared-idea.png
  caption: Shared neighbors boost A–B
  notes: A and B already share edge weight five. They also share neighbor C. Shared-neighbor
    affinity adds the minimum of those spokes—one—so A–B rises to six.
- type: image
  title: Shared ranking reshuffles the list
  image: assets/steps/04-shared-rank.png
  caption: Shared ranking reshuffles the list
  notes: Under shared-neighbor scoring, A–B and D–E lead at six. Weak edge A–C jumps
    to five because of B. Non-edges like B–D can appear from shared support alone.
- type: image
  title: Why affinity matters in EDA
  image: assets/steps/05-takeaway.png
  caption: Why affinity matters in EDA
  notes: 'Affinity is the objective’s local preference: which cells belong together
    before global constraints. Bad affinity means bad merges, and harder refinement
    later.'
- type: bullets
  title: Browser lab track
  bullets:
  - In the browser lab track, open the affinity metrics lab, load the starter example
  - Clear the ten challenges when you’re ready
  notes: In the browser lab track, open the affinity metrics lab, load the starter
    example, and switch between the two ranking buttons. Clear the ten challenges
    when you’re ready—start with the top edge-weight pair, then the shared-neighbor
    climb for A–C.
- type: bullets
  title: Implement track
  bullets:
  - In the implement track, load the tiny weighted graph and print both rankings
  - 'Match the goldens: edge weight tops at five for A–B; shared-neighbor lifts A–B
    to six'
  - Run the unit tests from the course common folder so your scores stay honest
  notes: 'In the implement track, load the tiny weighted graph and print both rankings.
    Match the goldens: edge weight tops at five for A–B; shared-neighbor lifts A–B
    to six. Run the unit tests from the course common folder so your scores stay honest.'
- type: code
  title: Implement track — try these
  code: '# pwd — print working directory (where am I?)

    pwd


    # ls examples — confirm the starter graph is here

    ls examples


    # print both affinity rankings

    export PYTHONPATH=../common

    python ../common/solvers.py examples/tiny_graph.json --mode affinity'
  notes: ''
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Watch for mixing directed and undirected assumptions, or double-counting a neighbor
  - Don’t invent pairs with zero connection unless your API says so
  - And don’t let a later merge engine silently use a different affinity than the
    one you
  notes: Watch for mixing directed and undirected assumptions, or double-counting
    a neighbor. Don’t invent pairs with zero connection unless your API says so. And
    don’t let a later merge engine silently use a different affinity than the one
    you documented.
- type: bullets
  title: Your turn
  bullets:
  - Finish the checklist for at least one track
  - Match both golden tables, then explain why A–C climbs under shared-neighbor scoring
  - Take the short quiz
  notes: Finish the checklist for at least one track. Match both golden tables, then
    explain why A–C climbs under shared-neighbor scoring. Take the short quiz, then
    continue to greedy pair merge—where these scores become the merge policy.
