title: Offline benchmark compare
footer: learn_clustering — 01 offline benchmark compare
slides:
- type: title
  title: Offline benchmark compare
  subtitle: Toy engines teach mechanism; tables teach honesty
  notes: Toy engines teach mechanism; tables teach honesty. You’ll run the same tiny
    instance through greedy, spectral, multilevel, and refinement from a bad seed—then
    optionally an external tool.
- type: bullets
  title: Fair compare rules
  bullets:
  - Identical input
  - Fixed seeds when randomized
  - Same metrics
  - If an external tool is missing, document the gap, don’t invent goldens
  notes: Identical input. Fixed seeds when randomized. Same metrics. If an external
    tool is missing, document the gap—don’t invent goldens.
- type: bullets
  title: What good looks like
  bullets:
  - On this instance, several engines agree on cutsize three for the natural clusters
  - Refinement shows twelve to three from a bad seed
  - Huge unexplained wins usually mean a metric mismatch
  notes: On this instance, several engines agree on cutsize three for the natural
    clusters. Refinement shows twelve to three from a bad seed. Huge unexplained wins
    usually mean a metric mismatch.
- type: bullets
  title: Your turn
  bullets:
  - Fill the comparison table from EXAMPLES
  notes: Fill the comparison table from EXAMPLES, finish the checklist, then continue
    to the wrap module.
