title: Hypergraph clustering
footer: learn_clustering — 03 hypergraph clustering
slides:
- type: title
  title: Hypergraph clustering
  subtitle: Netlists are hypergraphs, one net can touch many pins
  notes: Netlists are hypergraphs—one net can touch many pins. You’ll watch greedy
    clustering on a tiny hypergraph where multi-pin net n1 pulls A–B–C together.
- type: image
  title: Nets are hyperedges
  image: assets/steps/01-nets.png
  caption: Nets are hyperedges
  notes: 'TINY_HYPERGRAPH has four nets: multi-pin n1={A,B,C} weight 3, pair n2={D,E},
    bridge n3={C,D}, and n4={A,B}. Cut counts whole nets, not pairs.'
- type: image
  title: Affinity = shared pin weight
  image: assets/steps/02-affinity.png
  caption: Affinity = shared pin weight
  notes: Greedy merge scores pairs by summed weights of hyperedges that contain both
    endpoints. A–B and A–C–B affinities favor the ABC community.
- type: image
  title: Merge down to K=2
  image: assets/steps/03-merge-k2.png
  caption: Merge down to K=2
  notes: Repeated contraction yields two clusters covering ABC and DE. Only bridge
    net n3 is cut.
- type: image
  title: Hyperedge cut = 1
  image: assets/steps/04-cut-1.png
  caption: Hyperedge cut = 1
  notes: 'Golden: hyperedge cut 1 (n3 only). Pairwise graph cut on a clique expansion
    would score differently — that is the teaching contrast.'
- type: image
  title: Why hypergraphs in EDA
  image: assets/steps/05-takeaway.png
  caption: Why hypergraphs in EDA
  notes: Real nets touch many cells. Modeling them as hyperedges keeps the cut objective
    honest. Browser view clique-expands only for drawing.
- type: bullets
  title: Browser lab track
  bullets:
  - In the browser lab, load the starter hypergraph and run greedy clustering to K
    equals two
  - Confirm hyperedge cut one for ABC versus DE
  notes: In the browser lab, load the starter hypergraph and run greedy clustering
    to K equals two. Confirm hyperedge cut one for ABC versus DE.
- type: bullets
  title: Implement track
  bullets:
  - Run hypergraph greedy to K equals two
  - Confirm hyperedge cut one and the natural clusters
  notes: Run hypergraph greedy to K equals two. Confirm hyperedge cut one and the
    natural clusters.
- type: code
  title: Implement track — try these
  code: 'export PYTHONPATH=../common

    python ../common/solvers.py examples/tiny_hypergraph.json --mode hypergraph --k
    2'
  notes: ''
- type: bullets
  title: Pitfalls to watch
  bullets:
  - Clique-expanding hyperedges changes the objective
  - Counting a cut once per hyperedge, not per pair, is required
  - Empty or singleton nets must be filtered
  notes: Clique-expanding hyperedges changes the objective. Counting a cut once per
    hyperedge—not per pair—is required. Empty or singleton nets must be filtered.
- type: bullets
  title: Your turn
  bullets:
  - Match hyperedge cut one
  notes: Match hyperedge cut one, finish the checklist and quiz, then continue to
    congestion-aware clustering.
