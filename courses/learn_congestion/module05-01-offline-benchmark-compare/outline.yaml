- type: bullets
  title: Harness shape
  bullets:
  - A small Python driver loading tiny_cong.json is enough
  - Print a markdown table
  - Missing external tools are OK, document blockers and still validate I/O
  notes: A small Python driver loading tiny_cong.json is enough. Print a markdown
    table. Missing external tools are OK—document blockers and still validate I/O.
- type: bullets
  title: Pitfalls
  bullets:
  - Changing Cap between rows of the table
  - Comparing incompatible demand units
  - Optimizing runtime before correctness
  notes: Changing Cap between rows of the table. Comparing incompatible demand units.
    Optimizing runtime before correctness.
