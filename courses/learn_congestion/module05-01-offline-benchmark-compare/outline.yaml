slides:
- type: title
  title: Why compare
  subtitle: 'Toy estimators need a harness: same JSON in, overflow and runtime out'
  notes: 'Toy estimators need a harness: same JSON in, overflow and runtime out. Comparing
    engines teaches you what “better congestion” means beyond a pretty heat map.'
- type: bullets
  title: The idea
  bullets:
  - Fix the instance
  - Run RUDY and probabilistic
  - Record total overflow, max overflow, wall time
  - Optionally compare to a reference map
  - Write one discrepancy hypothesis
  notes: Fix the instance. Run RUDY and probabilistic. Record total overflow, max
    overflow, wall time. Optionally compare to a reference map. Write one discrepancy
