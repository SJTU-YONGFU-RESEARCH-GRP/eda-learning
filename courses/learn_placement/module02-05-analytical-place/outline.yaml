title: Analytical / density-aware place
footer: learn_placement — 05 analytical place
slides:
- type: title
  title: Analytical / density-aware place
  subtitle: Analytical lite first pulls for wirelength, then spreads for density with
    pads A and D fixed
  notes: Analytical lite first pulls for wirelength, then spreads for density with
    pads A and D fixed. From starter fifty-two you should land near forty-eight point
    one—close to quadratic, deliberately above free force, because spreading fights
    pure collapse.
- type: bullets
  title: The idea
  bullets:
  - Wirelength stage clusters
  - Watch both HPWL and overflow
  notes: Wirelength stage clusters; density stage pushes cells out of overloaded bins;
    a light reconnect keeps HPWL from exploding. Watch both HPWL and overflow—winning
    wirelength while overflowing every bin is not analytical success.
- type: bullets
  title: Pseudocode
  bullets:
  - Analytical lite is three stages in pseudocode
  - Open this module's examples file and find the Pseudocode section
  - That written sketch is what you implement on the implement track and what the
    browser
  notes: 'Analytical lite is three stages in pseudocode: wirelength clustering, density
    repulsion from overloaded bins, then a light reconnect so HPWL does not explode.


    Open this module''s examples file and find the Pseudocode section. That written
    sketch is what you implement on the implement track and what the browser challenges
    measure.'
- type: bullets
  title: Algorithm sketch
  bullets:
  - Default teaching run lands near forty-eight point one HPWL
  - Winning wirelength while overflowing every bin is not success, report both metrics
  notes: Default teaching run lands near forty-eight point one HPWL. Winning wirelength
    while overflowing every bin is not success—report both metrics.
- type: code
  title: Algorithm sketch — try these
  code: 'INPUT: positions, bins, pads

    OUTPUT: positions, HPWL, overflow

    stage1: wirelength pull (force/quad style)

    stage2: push out of overloaded bins

    stage3: light reconnect for HPWL

    report HPWL and overflow together

    GOLDEN lite ≈48.1 HPWL after defaults'
  notes: ''
- type: image
  title: Wirelength stage clusters first
  image: assets/steps/01-wl-stage.png
  caption: Wirelength stage clusters first
  notes: 'Analytical lite starts like force/quadratic: pull for wirelength with pads
    A and D fixed. Clustering cuts HPWL but can overload bins.'
- type: image
  title: Density stage pushes overloaded bins
  image: assets/steps/02-density-stage.png
  caption: Density stage pushes overloaded bins
  notes: A density-repulsion stage pushes cells out of crowded two-by-two bins, then
    a light reconnect keeps HPWL from exploding.
- type: image
  title: 'After analytical: about forty-eight point one'
  image: assets/steps/03-after-anal.png
  caption: 'After analytical: about forty-eight point one'
  notes: The combined solve lands near forty-eight point one—close to quadratic, deliberately
    above free force, because spreading fights pure collapse.
- type: image
  title: Report HPWL and overflow
  image: assets/steps/04-both-metrics.png
  caption: Report HPWL and overflow
  notes: Winning wirelength while overflowing every bin is not analytical success.
    Quote both metrics after the density stage.
- type: image
  title: Wirelength then density
  image: assets/steps/05-takeaway.png
  caption: Wirelength then density
  notes: 'Analytical lite is a two-act play: cluster for wirelength, spread for density.
    Lock pads and iteration knobs so forty-eight point one stays reproducible.'
- type: bullets
  title: Browser lab track
  bullets:
  - In the browser lab track, open the **analytical-place** lab from the tools shelf
  - Load the starter placement, run the algorithm once
  - Work the challenges that lock the goldens
  notes: In the browser lab track, open the **analytical-place** lab from the tools
    shelf. Load the starter placement, run the algorithm once, and read HPWL—and density
    when the panel shows it. Work the challenges that lock the goldens, then come
    back to implement the same loop yourself.
- type: bullets
  title: Implement track
  bullets:
  - In the implement track
  - Parse `tiny_place.json`, run the algorithm with a deterministic seed
  - Match the browser goldens before you claim the checklist
  notes: In the implement track, open this module's EXAMPLES.md Pseudocode section
    and the course common solvers. Parse `tiny_place.json`, run the algorithm with
    a deterministic seed, and print coordinates plus HPWL. Match the browser goldens
    before you claim the checklist.
- type: bullets
  title: Pitfalls
  bullets:
  - Common traps
  notes: 'Common traps: celebrating HPWL while cells pile into one bin; ignoring fixed
    pads A and D; mixing bbox and clique models in one report; keeping only the final
    SA iterate instead of the best; and forgetting that timing weights change the
    objective, not just the label.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - Implement until your metrics match the starter goldens
  - When you’re ready, take the short quiz, then continue to the next module
  notes: Complete the checklist for at least one track—preferably both. Implement
    until your metrics match the starter goldens. When you’re ready, take the short
    quiz, then continue to the next module.
