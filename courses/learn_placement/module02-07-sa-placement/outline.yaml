title: Simulated annealing placement
footer: learn_placement — 07 sa placement
slides:
- type: title
  title: Simulated annealing placement
  subtitle: Simulated annealing jogs one cell at a time under an HPWL cost
  notes: Simulated annealing jogs one cell at a time under an HPWL cost. With seed
    forty-two and sixty moves on the starter, best HPWL lands near forty-nine point
    six—modest improvement over fifty-two, not a force-style collapse.
- type: bullets
  title: The idea
  bullets:
  - Propose a small axis move, accept improvements always
  - Keep the best iterate, not only the final temperature
  - Fix the seed so your golden stays stable across runs
  notes: Propose a small axis move, accept improvements always, and accept worsenings
    with temperature probability. Keep the best iterate, not only the final temperature.
    Fix the seed so your golden stays stable across runs.
- type: bullets
  title: Pseudocode
  bullets:
  - Placement annealing jogs one cell per move under HPWL cost, accepts by Metropolis
  - Open this module's examples file and find the Pseudocode section
  - That written sketch is what you implement on the implement track and what the
    browser
  notes: 'Placement annealing jogs one cell per move under HPWL cost, accepts by Metropolis,
    and keeps the best iterate—not only the final temperature.


    Open this module''s examples file and find the Pseudocode section. That written
    sketch is what you implement on the implement track and what the browser challenges
    measure.'
- type: bullets
  title: Algorithm sketch
  bullets:
  - Seed forty-two with sixty moves yields best HPWL near forty-nine point six from
    fifty-two
  - Lock the seed so goldens stay stable
  notes: Seed forty-two with sixty moves yields best HPWL near forty-nine point six
    from fifty-two. Lock the seed so goldens stay stable.
- type: code
  title: Algorithm sketch — try these
  code: "INPUT: positions, seed, moves, T0\nOUTPUT: best positions + best HPWL\nfor\
    \ i in 1..moves:\n  jog one cell on one axis\n  accept if ΔHPWL<0 or rand<e^(−Δ/T)\n\
    \  keep best; cool T\nGOLDEN seed=42, 60 moves → best≈49.6\naccepted≈44 rejected≈16"
  notes: ''
- type: image
  title: Anneal from HPWL fifty-two
  image: assets/steps/01-starter-sa.png
  caption: Anneal from HPWL fifty-two
  notes: Simulated annealing jogs one cell at a time under an HPWL cost. Seed forty-two
    and sixty moves on the starter—deterministic teaching run.
- type: image
  title: Accept improvements; maybe worsenings
  image: assets/steps/02-accept-reject.png
  caption: Accept improvements; maybe worsenings
  notes: Improvements always accept. Worsenings accept with probability exp(−Δ/T).
    Temperature cools each move so late stages get pickier.
- type: image
  title: Best HPWL near forty-nine point six
  image: assets/steps/03-best-not-final.png
  caption: Best HPWL near forty-nine point six
  notes: With seed forty-two the best HPWL lands near forty-nine point six—modest
    gain over fifty-two. Report best, not only the final temperature.
- type: image
  title: Fix the seed for goldens
  image: assets/steps/04-seed-lock.png
  caption: Fix the seed for goldens
  notes: Change the seed and accept/reject counts drift. Teaching labs lock seed forty-two
    so forty-nine point six stays a stable challenge.
- type: image
  title: SA is a stochastic local search
  image: assets/steps/05-takeaway.png
  caption: SA is a stochastic local search
  notes: Propose, score, accept or reject, cool, and remember the best. On this instance
    expect about forty-nine point six—not a force-style collapse.
- type: bullets
  title: Browser lab track
  bullets:
  - In the browser lab track, open the **sa-placement** lab from the tools shelf
  - Load the starter placement, run the algorithm once
  - Work the challenges that lock the goldens
  notes: In the browser lab track, open the **sa-placement** lab from the tools shelf.
    Load the starter placement, run the algorithm once, and read HPWL—and density
    when the panel shows it. Work the challenges that lock the goldens, then come
    back to implement the same loop yourself.
- type: bullets
  title: Implement track
  bullets:
  - In the implement track
  - Parse `tiny_place.json`, run the algorithm with a deterministic seed
  - Match the browser goldens before you claim the checklist
  notes: In the implement track, open this module's EXAMPLES.md Pseudocode section
    and the course common solvers. Parse `tiny_place.json`, run the algorithm with
    a deterministic seed, and print coordinates plus HPWL. Match the browser goldens
    before you claim the checklist.
- type: bullets
  title: Pitfalls
  bullets:
  - Common traps
  notes: 'Common traps: celebrating HPWL while cells pile into one bin; ignoring fixed
    pads A and D; mixing bbox and clique models in one report; keeping only the final
    SA iterate instead of the best; and forgetting that timing weights change the
    objective, not just the label.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - Implement until your metrics match the starter goldens
  - When you’re ready, take the short quiz, then continue to the next module
  notes: Complete the checklist for at least one track—preferably both. Implement
    until your metrics match the starter goldens. When you’re ready, take the short
