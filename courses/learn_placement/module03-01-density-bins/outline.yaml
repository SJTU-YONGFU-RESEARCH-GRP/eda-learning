title: Density bins and overflow
footer: learn_placement — 01 density bins
slides:
- type: title
  title: Density bins and overflow
  subtitle: Density bins count cells on a grid and sum overflow above capacity
  notes: Density bins count cells on a grid and sum overflow above capacity. On a
    two-by-two grid with capacity one, both starter and golden still overflow by two—compact
    HPWL does not automatically mean legal density. Raise capacity to two on golden
    and overflow drops to one.
- type: bullets
  title: The idea
  bullets:
  - Assign each cell to a bin by coordinates
  - Report HPWL and overflow together
  - A pretty wirelength with piled bins fails the density half of placement
  - <!-- algorithm-walkthrough -->
  notes: 'Assign each cell to a bin by coordinates, count occupants, then overflow
    equals sum of max(zero, count minus capacity). Report HPWL and overflow together.
    A pretty wirelength with piled bins fails the density half of placement.


    <!-- algorithm-walkthrough -->'
- type: image
  title: Partition the die into bins
  image: assets/steps/01-grid-idea.png
  caption: Partition the die into bins
  notes: Density bins count cells on a regular grid. Default teaching grid is two-by-two
    over [0,8]×[0,8]. Capacity one means each bin may hold one cell before overflow.
- type: image
  title: Starter overflows by two
  image: assets/steps/02-starter-overflow.png
  caption: Starter overflows by two
  notes: On the spread starter with capacity one, two bins hold two cells each. Overflow
    sums to two even though HPWL is already fifty-two.
- type: image
  title: Golden also overflows at cap one
  image: assets/steps/03-golden-still-overflow.png
  caption: Golden also overflows at cap one
  notes: Compact HPWL fourteen still piles three cells into one bin. Overflow remains
    two at capacity one—pretty wirelength is not automatic legality.
- type: image
  title: Raise capacity to ease overflow
  image: assets/steps/04-raise-capacity.png
  caption: Raise capacity to ease overflow
  notes: With capacity two on the golden placement, overflow drops to one. Capacity
    is part of the spec—quote it with the overflow number.
- type: image
  title: HPWL and density travel together
  image: assets/steps/05-takeaway.png
  caption: HPWL and density travel together
  notes: 'Always report wirelength and bin overflow. A placement that wins HPWL while
    stacking bins fails the density half of the story.


    <!-- /algorithm-walkthrough -->'
- type: bullets
  title: Browser lab track
  bullets:
  - In the browser lab track, open the **density-bins** lab from the tools shelf
  - Load the starter placement, run the algorithm once
  - Work the challenges that lock the goldens
  notes: In the browser lab track, open the **density-bins** lab from the tools shelf.
    Load the starter placement, run the algorithm once, and read HPWL—and density
    when the panel shows it. Work the challenges that lock the goldens, then come
    back to implement the same loop yourself.
- type: bullets
  title: Implement track
  bullets:
  - In the implement track, open this module’s examples and the course `common/` solvers
  - Parse `tiny_place.json`, run the algorithm with a deterministic seed
  - Match the browser goldens before you claim the checklist
  notes: In the implement track, open this module’s examples and the course `common/`
    solvers. Parse `tiny_place.json`, run the algorithm with a deterministic seed,
    and print coordinates plus HPWL. Match the browser goldens before you claim the
    checklist.
- type: bullets
  title: Pitfalls
  bullets:
  - Common traps
  notes: 'Common traps: celebrating HPWL while cells pile into one bin; ignoring fixed
    pads A and D; mixing bbox and clique models in one report; keeping only the final
    SA iterate instead of the best; and forgetting that timing weights change the
    objective, not just the label.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - Implement until your metrics match the starter goldens
  - When you’re ready, take the short quiz, then continue to the next module
  notes: Complete the checklist for at least one track—preferably both. Implement
    until your metrics match the starter goldens. When you’re ready, take the short
    quiz, then continue to the next module.
