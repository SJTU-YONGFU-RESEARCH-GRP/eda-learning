title: Timing-driven placement
footer: learn_placement — 01 timing driven place
slides:
- type: title
  title: Timing-driven placement
  subtitle: Timing-driven place weights critical nets in the wirelength objective
  notes: Timing-driven place weights critical nets in the wirelength objective. On
    the starter, plain HPWL is fifty-two but timing-weighted HPWL is one hundred sixteen
    because the four-pin net carries weight five. The compact golden drops timing-weighted
    cost to thirty.
- type: bullets
  title: The idea
  bullets:
  - Multiply each net’s HPWL by its criticality weight and sum
  - Heavy weights pull critical nets shorter even when plain HPWL looks fine
  - Always report both plain and weighted totals so you can see what the objective
    actually
  notes: Multiply each net’s HPWL by its criticality weight and sum. Heavy weights
    pull critical nets shorter even when plain HPWL looks fine. Always report both
    plain and weighted totals so you can see what the objective actually optimized.
