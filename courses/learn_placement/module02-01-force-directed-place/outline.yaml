title: Force-directed placement
footer: learn_placement — 01 force directed place
slides:
- type: title
  title: Force-directed placement
  subtitle: Force-directed place pulls each free cell toward the average of its net
    neighbors, plus a weak center pull
  notes: Force-directed place pulls each free cell toward the average of its net neighbors,
    plus a weak center pull. From the starter HPWL of fifty-two, a few lite iterations
    land near eighteen point seven—better wirelength, still above the golden fourteen.
- type: bullets
  title: The idea
  bullets:
  - Each iteration
  - Fixed pads stay put
  - Too much alpha collapses the design; too little barely moves
  - Report HPWL before and after with the same net model
  notes: 'Each iteration: for free cells, blend current position toward the neighbor
    average with a small alpha. Fixed pads stay put. Too much alpha collapses the
    design; too little barely moves. Report HPWL before and after with the same net
    model.'
- type: bullets
  title: Pseudocode
  bullets:
  - Force-directed place blends each free cell toward its neighbor average with step
    alpha
  - Fixed pads do not move
  - Open this module's examples file and find the Pseudocode section
  - That written sketch is what you implement on the implement track and what the
    browser
  notes: 'Force-directed place blends each free cell toward its neighbor average with
    step alpha. Fixed pads do not move.


    Open this module''s examples file and find the Pseudocode section. That written
    sketch is what you implement on the implement track and what the browser challenges
    measure.'
- type: bullets
  title: Algorithm sketch
  bullets:
  - From starter fifty-two
  notes: From starter fifty-two, default lite iterations land near eighteen point
    seven—better wirelength, still above compact fourteen.
- type: code
  title: Algorithm sketch — try these
  code: "INPUT: positions, nets, α, iters, fixed pads\nOUTPUT: updated positions +\
    \ HPWL\neach iter, for free cell c:\n  tgt ← avg neighbor coords (+ weak center)\n\
    \  pos[c] ← (1−α)·pos[c] + α·tgt\npads stay fixed\nGOLDEN starter 52 → ≈18.7 after\
    \ defaults"
  notes: ''
- type: image
  title: Start from HPWL fifty-two
  image: assets/steps/01-starter.png
  caption: Start from HPWL fifty-two
  notes: Force-directed place pulls free cells toward the average of their net neighbors,
    plus a weak center pull. Begin on the spread starter at HPWL fifty-two.
- type: image
  title: Neighbors pull cells inward
  image: assets/steps/02-mid-iters.png
  caption: Neighbors pull cells inward
  notes: After a couple of lite iterations, A–D drift toward the center while E and
    F follow their neighbors. Wirelength is already dropping.
- type: image
  title: 'After force: about eighteen point seven'
  image: assets/steps/03-after-force.png
  caption: 'After force: about eighteen point seven'
  notes: Default five iterations land near eighteen point seven—clearly better than
    fifty-two, still above the compact golden fourteen.
- type: image
  title: Force vs golden compact
  image: assets/steps/04-vs-golden.png
  caption: Force vs golden compact
  notes: Golden fourteen is tighter still. Force is a cheap continuous move—good teaching
    progress without claiming the absolute minimum.
- type: image
  title: Alpha trades speed vs collapse
  image: assets/steps/05-takeaway.png
  caption: Alpha trades speed vs collapse
  notes: Too much alpha stacks cells; too little barely moves. Lock the iteration
    count and alpha so your eighteen point seven golden stays stable.
- type: bullets
  title: Browser lab track
  bullets:
  - In the browser lab track, open the **force-directed-place** lab from the tools
    shelf
  - Load the starter placement, run the algorithm once
  - Work the challenges that lock the goldens
  notes: In the browser lab track, open the **force-directed-place** lab from the
    tools shelf. Load the starter placement, run the algorithm once, and read HPWL—and
    density when the panel shows it. Work the challenges that lock the goldens, then
    come back to implement the same loop yourself.
- type: bullets
  title: Implement track
  bullets:
  - In the implement track
  - Parse `tiny_place.json`, run the algorithm with a deterministic seed
  - Match the browser goldens before you claim the checklist
  notes: In the implement track, open this module's EXAMPLES.md Pseudocode section
    and the course common solvers. Parse `tiny_place.json`, run the algorithm with
    a deterministic seed, and print coordinates plus HPWL. Match the browser goldens
    before you claim the checklist.
- type: bullets
  title: Pitfalls
  bullets:
  - Common traps
  notes: 'Common traps: celebrating HPWL while cells pile into one bin; ignoring fixed
    pads A and D; mixing bbox and clique models in one report; keeping only the final
    SA iterate instead of the best; and forgetting that timing weights change the
    objective, not just the label.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - Implement until your metrics match the starter goldens
  - When you’re ready, take the short quiz, then continue to the next module
  notes: Complete the checklist for at least one track—preferably both. Implement
    until your metrics match the starter goldens. When you’re ready, take the short
    quiz, then continue to the next module.
