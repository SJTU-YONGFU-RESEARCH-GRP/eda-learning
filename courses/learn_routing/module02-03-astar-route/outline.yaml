- type: image
  title: Browser lab track
  image: assets/lab-starter.png
  caption: Browser lab starter
  notes: Open **astar-route**. Pre-fill M1 edge one comma one to two comma one at
    capacity one and watch A* pick a longer detour. Clear the block and confirm the
    shortest path returns.
- type: bullets
  title: Implement track
  bullets:
  - Implement or call `astar_route(start, goal, usage, cap, nx, ny, blocks)`
  - Block the hot edge and show A* cannot go direct; unblock a vertical detour path
    exists
  notes: Implement or call `astar_route(start, goal, usage, cap, nx, ny, blocks)`.
    Block the hot edge and show A* cannot go direct; unblock a vertical detour path
    exists.
- type: bullets
  title: Pitfalls
  bullets:
  - Using undirected track keys inconsistently
  - Checking capacity on the wrong layer for a move
  - Forgetting blockages still forbid cells even when tracks are free
  notes: Using undirected track keys inconsistently. Checking capacity on the wrong
    layer for a move. Forgetting blockages still forbid cells even when tracks are
    free.
