title: Congestion-aware search
footer: learn_routing — 03 astar route
slides:
- type: title
  title: Congestion-aware search
  subtitle: Lee ignores other nets
  notes: Lee ignores other nets. Production detailed routers penalize hot tracks.
    Our A* adds a heavy step cost when usage is already at capacity so routes detour
    around congested M1 or M2 edges.
- type: bullets
  title: The idea
  bullets:
  - Maintain open heap ordered by f equals g plus Manhattan distance to goal
  - Expand four neighbors on M1 for horizontal steps and M2 for vertical
  - Step cost is one plus ten times overflow penalty when usage meets capacity
  - First time you pop the goal, return the path
  notes: Maintain open heap ordered by f equals g plus Manhattan distance to goal.
    Expand four neighbors on M1 for horizontal steps and M2 for vertical. Step cost
    is one plus ten times overflow penalty when usage meets capacity. First time you
    pop the goal, return the path.
