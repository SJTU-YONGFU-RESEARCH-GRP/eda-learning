title: When usage exceeds capacity
footer: learn_routing — 05 track usage
slides:
- type: title
  title: When usage exceeds capacity
  subtitle: Each directed M1 or M2 track has capacity one on tiny_dr
  notes: Each directed M1 or M2 track has capacity one on tiny_dr. Every routed net
    deposits plus one on each track its segments traverse. Overflow is how far usage
    exceeds capacity—summed, maxed, and counted per track.
- type: bullets
  title: The idea
  bullets:
  - Path_track_usage walks consecutive segment pairs
  - Track_overflow computes max of zero and usage minus capacity per track
  - Sequential L-HV on all six nets should yield positive total overflow at cap one
  notes: path_track_usage walks consecutive segment pairs, maps horizontal moves to
    h_edge and vertical to v_edge, increments usage. track_overflow computes max of
    zero and usage minus capacity per track. Sequential L-HV on all six nets should
    yield positive total overflow at cap one.
- type: image
  title: Usage heat
  image: assets/steps/01-def.png
  caption: Usage heat
  notes: Each M1/M2 track accumulates routed net count.
- type: image
  title: Total overflow
  image: assets/steps/02-total.png
  caption: Total overflow
  notes: Sum over tracks—primary scalar.
- type: image
  title: Max overflow
  image: assets/steps/03-max.png
  caption: Max overflow
  notes: Worst track catches hotspot corridors.
- type: image
  title: Overflow count
  image: assets/steps/04-count.png
  caption: Overflow count
  notes: How many tracks exceed Cap.
- type: image
  title: Hit targets
  image: assets/steps/05-target.png
  caption: Hit targets
  notes: Move pins or switch Lee/A* to clear thresholds.
- type: image
  title: Browser lab track
  image: assets/lab-starter.png
  caption: Browser lab starter
  notes: Open **track-usage**. Run sequential L routes and read the triple total max
    count. Heat-map the worst track.
- type: bullets
  title: Implement track
  bullets:
  - Implement `path_track_usage` and `track_overflow`
  - Call sequential_detailed with mode l_hv on tiny_dr and assert total overflow is
    greater
  notes: Implement `path_track_usage` and `track_overflow`. Call sequential_detailed
    with mode l_hv on tiny_dr and assert total overflow is greater than zero.
- type: bullets
  title: Pitfalls
  bullets:
  - Computing overflow before summing all nets
  - Using GCell edge usage from global routing instead of directed tracks
  - Reporting negative overflow values
  notes: Computing overflow before summing all nets. Using GCell edge usage from global
    routing instead of directed tracks. Reporting negative overflow values.
- type: bullets
  title: Your turn
  bullets:
  - Hit overflow targets
  - 'Next: assign vias on two-layer L paths'
  notes: 'Hit overflow targets. Next: assign vias on two-layer L paths.'
