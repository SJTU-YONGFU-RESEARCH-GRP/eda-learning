  notes: 'Toy detailed routers need a harness: same JSON in, track overflow and runtime
    out. Comparing Lee, L-layer, A*, and rip-up teaches what better means beyond a
    pretty heat map.'
- type: bullets
  title: The idea
  bullets:
  - Fix tiny_dr
  - Run sequential L-HV, Lee mode, A* mode, and one rip-up pass
  - Record total overflow, max overflow, wall time
  - Optionally compare to a reference router
  - Write one discrepancy hypothesis
  notes: Fix tiny_dr. Run sequential L-HV, Lee mode, A* mode, and one rip-up pass.
