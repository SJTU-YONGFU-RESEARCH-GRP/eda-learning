title: Slicing tree / polish expression packing
footer: learn_floorplanning — 01 slicing floorplan
slides:
- type: title
  title: Slicing tree / polish expression packing
  subtitle: Slicing floorplans use through-cuts
  notes: Slicing floorplans use through-cuts. The golden polish A D H B V C V E V
    stacks A under D, then attaches B, C, and E with vertical cuts—bounding box nine
    by three.
- type: bullets
  title: Pseudocode
  bullets:
  - Slicing polish is a postfix stack
  - Modules push rectangles; H stacks vertically; V places side by side
  - The sketch names the operators so evaluation stays deterministic
  - Open this module's examples file and find the Pseudocode section
  - That written sketch is what you implement on the implement track and what the
    browser
  notes: 'Slicing polish is a postfix stack. Modules push rectangles; H stacks vertically;
    V places side by side. The sketch names the operators so evaluation stays deterministic.


    Open this module''s examples file and find the Pseudocode section. That written
    sketch is what you implement on the implement track and what the browser challenges
    measure.'
- type: bullets
  title: Algorithm sketch
  bullets:
  - Golden tokens A D H B V C V E V pack to a nine by three bbox inside the ten by
    eight
  notes: Golden tokens A D H B V C V E V pack to a nine by three bbox inside the ten
    by eight outline.
- type: code
  title: Algorithm sketch — try these
  code: "INPUT: polish tokens (modules + H/V)\nOUTPUT: packing (x,y,w,h) per module\n\
    stack-eval postfix:\n  module → push rect\n  H: pop a,b; stack vertically\n  V:\
    \ pop a,b; place side by side\nGOLDEN: A D H B V C V E V\nbbox 9×3; legal in 10×8"
  notes: ''
- type: image
  title: Polish expression encodes cuts
  image: assets/steps/01-polish.png
  caption: Polish expression encodes cuts
  notes: A slicing floorplan is a tree of through-cuts. Postfix polish A D H B V C
    V E V stacks A under D, then places B, C, and E to the right with vertical cuts.
- type: image
  title: A D H stacks height 3
  image: assets/steps/02-stack-ad.png
  caption: A D H stacks height 3
  notes: A is three by two; D is three by one. An H cut stacks D above A into a three
    by three block at the lower left.
- type: image
  title: V attaches B on the right
  image: assets/steps/03-attach-b.png
  caption: V attaches B on the right
  notes: Next V places B beside the A–D stack. Bounding width becomes five; height
    stays three.
- type: image
  title: Full polish packs BB 9×3
  image: assets/steps/04-full.png
  caption: Full polish packs BB 9×3
  notes: Adding C and E with more V cuts finishes the golden polish. Bounding box
    is nine by three—legal inside the ten-by-eight outline.
- type: image
  title: Slicing cannot make wheels
  image: assets/steps/05-takeaway.png
  caption: Slicing cannot make wheels
  notes: Not every packing is slicing. Wheel topologies need non-slicing codes like
    B-star or sequence pair—next labs. For slicing, polish plus H/V evaluation is
    enough.
- type: bullets
  title: Browser lab track
  bullets:
  - Open slicing-floorplan and Evaluate polish
  - Confirm bounding width nine, height three, and a legal packing inside ten by eight
  notes: Open slicing-floorplan and Evaluate polish. Confirm bounding width nine,
    height three, and a legal packing inside ten by eight.
- type: bullets
  title: Implement track
  bullets:
  - Implement postfix evaluation for H and V
  - On the golden token list, assert width nine, height three, and is_legal_packing
    true
  notes: Implement postfix evaluation for H and V. On the golden token list, assert
    width nine, height three, and is_legal_packing true.
- type: bullets
  title: Pitfalls
  bullets:
  - Swapping H/V meanings
  notes: Swapping H/V meanings; leaving polish operands on the stack; assuming every
    packing is slicing—wheels need other reps.
- type: bullets
  title: Your turn
  bullets:
  - Ship a legal polish pack with BB nine by three
  - 'Next: B-star trees for non-slicing adjacency'
  notes: 'Ship a legal polish pack with BB nine by three. Next: B-star trees for non-slicing
    adjacency.'
