title: Sequence-pair representation
footer: learn_floorplanning — 05 sequence pair
slides:
- type: title
  title: Sequence-pair representation
  subtitle: Sequence pair uses positive permutation A B C E D and negative D A B C
    E
  notes: 'Sequence pair uses positive permutation A B C E D and negative D A B C E.
    Longest-path packing from left-of and below constraints places all five modules
    legally.


    <!-- algorithm-walkthrough -->'
- type: image
  title: Two permutations encode geometry
  image: assets/steps/01-seqs.png
  caption: Two permutations encode geometry
  notes: Sequence pair uses a positive and a negative permutation of the same modules.
    Ours are pos A B C E D and neg D A B C E—five ids each, same set.
- type: image
  title: Horizontal constraints set x
  image: assets/steps/02-h-rules.png
  caption: Horizontal constraints set x
  notes: Module i is left of j when i appears before j in both sequences. Longest-path
    packing pushes each block as far left as those constraints allow.
- type: image
  title: Vertical constraints set y
  image: assets/steps/03-v-rules.png
  caption: Vertical constraints set y
  notes: Module i is below j when i precedes j in pos but follows in neg. That fills
    y coordinates without overlaps for a feasible pair.
- type: image
  title: Golden SP packs legally
  image: assets/steps/04-legal.png
  caption: Golden SP packs legally
  notes: Evaluating the golden sequences places all five modules with non-negative
    coordinates and a legal packing inside the outline.
- type: image
  title: SP neighbors are permutation moves
  image: assets/steps/05-takeaway.png
  caption: SP neighbors are permutation moves
  notes: 'Annealing on sequence pair swaps or rotates entries in pos and neg. Feasibility
    stays geometric; cost can be deadspace plus wirelength.


    <!-- /algorithm-walkthrough -->'
- type: bullets
  title: Browser lab track
  bullets:
  - Open sequence-pair and Pack sequence pair
  - Confirm five modules, non-negative coordinates
  notes: Open sequence-pair and Pack sequence pair. Confirm five modules, non-negative
    coordinates, and legality true on the golden permutations.
- type: bullets
  title: Implement track
  bullets:
  - Implement longest-path SP packing
  - Assert pos and neg are the same five ids, and the golden pair packs legally
  notes: Implement longest-path SP packing. Assert pos and neg are the same five ids,
    and the golden pair packs legally.
- type: bullets
  title: Pitfalls
  bullets:
  - Mismatched id sets between pos and neg
  notes: Mismatched id sets between pos and neg; swapping the horizontal/vertical
    rules; negative coordinates from a buggy DP.
- type: bullets
  title: Your turn
  bullets:
  - Pack the golden sequences legally
  - 'Next: simulated annealing that prefers legal low-cost neighbors'
  notes: 'Pack the golden sequences legally. Next: simulated annealing that prefers
    legal low-cost neighbors.'
