title: Boundary pin / I/O assignment
footer: learn_floorplanning — 03 pin assignment
slides:
- type: title
  title: Boundary pin / I/O assignment
  subtitle: Pins sit on outline edges
  notes: 'Pins sit on outline edges. Golden assignment places P0 left, P1 bottom,
    P2 right, P3 top—four sides covered so pinsValid is true. An empty list is invalid.


    <!-- algorithm-walkthrough -->'
- type: image
  title: Packing without pins
  image: assets/steps/01-no-pins.png
  caption: Packing without pins
  notes: Start from the golden packing with an empty pin list. Pins will sit on outline
    edges—not inside modules—for I/O literacy.
- type: image
  title: Assign one pin per side
  image: assets/steps/02-assign.png
  caption: Assign one pin per side
  notes: Golden pins place P0 on the left, P1 on the bottom, P2 on the right, and
    P3 on the top. Offsets stay inside each edge length.
- type: image
  title: Coverage makes pinsValid true
  image: assets/steps/03-valid.png
  caption: Coverage makes pinsValid true
  notes: pinsValid requires every side to appear and offsets to lie on the edge. The
    golden set covers all four sides—valid returns true.
- type: image
  title: Empty set is invalid
  image: assets/steps/04-empty-bad.png
  caption: Empty set is invalid
  notes: 'Clear the pins and validity fails: you no longer cover four sides. Assignment
    is a first-class constraint, not decoration.'
- type: image
  title: Pins feed place and route
  image: assets/steps/05-takeaway.png
  caption: Pins feed place and route
  notes: 'Boundary pins shape terminal propagation and routing demand. After floorplan
    shapes settle, pin assignment is the bridge to placement.


    <!-- /algorithm-walkthrough -->'
- type: bullets
  title: Browser lab track
  bullets:
  - Open pin-assignment
  - Assign golden pins, confirm four sides and valid true
  - Clear pins and watch validity fail
  notes: Open pin-assignment. Assign golden pins, confirm four sides and valid true.
    Clear pins and watch validity fail.
- type: bullets
  title: Implement track
  bullets:
  - Implement pinsValid requiring all four sides and in-range offsets
  - Assert golden pins pass and the empty list fails
  notes: Implement pinsValid requiring all four sides and in-range offsets. Assert
    golden pins pass and the empty list fails.
- type: bullets
  title: Pitfalls
  bullets:
  - Putting pins inside modules
  notes: Putting pins inside modules; offsets past edge length; claiming validity
    with only two sides covered.
- type: bullets
  title: Your turn
  bullets:
  - Ship a valid four-side assignment
  - Offline compare is next; then the wrap points to learn_placement
  notes: Ship a valid four-side assignment. Offline compare is next; then the wrap
    points to learn_placement.
