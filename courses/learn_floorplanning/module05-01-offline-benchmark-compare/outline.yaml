title: Offline benchmark compare
footer: learn_floorplanning — 01 offline benchmark compare
slides:
- type: title
  title: Offline benchmark compare
  subtitle: Toy packers teach mechanism
  notes: Toy packers teach mechanism. Benchmarks teach honesty. In this offline module
    you’ll run the same tiny_modules instances through your floorplan code and, when
    available, a reference packing—then compare deadspace, density, wirelength proxy,
    and runtime without pretending the numbers are tape-out sign-off.
- type: bullets
  title: Fair compare rules
  bullets:
  - Use identical input and the same outline
  - Fix seeds when search is randomized
  - Report the same metrics on both sides
  - If a reference engine is missing
  - A clean I/O contract matters more than a flashy chart
  notes: Use identical input and the same outline. Fix seeds when search is randomized.
    Report the same metrics on both sides. If a reference engine is missing, still
    run your harness and document the gap—don’t invent golden deadspace. A clean I/O
    contract matters more than a flashy chart.
- type: bullets
  title: What good looks like
  bullets:
  - Expect your educational engine to be slower and sometimes lower quality
  - That’s fine
  - You’re looking for legal packings, non-negative deadspace consistent with areas
  - Huge unexplained wins usually mean a metric mismatch
  notes: Expect your educational engine to be slower and sometimes lower quality.
    That’s fine. You’re looking for legal packings, non-negative deadspace consistent
    with areas, and improving cost under SA. Huge unexplained wins usually mean a
    metric mismatch—or an illegal packing you failed to reject.
- type: bullets
  title: Your turn
  bullets:
  - Follow the examples file, fill the comparison table, and finish the checklist
  - Bring one discrepancy and a short hypothesis into your notes
  - Then continue to the wrap module to close the course
  notes: Follow the examples file, fill the comparison table, and finish the checklist.
    Bring one discrepancy and a short hypothesis into your notes. Then continue to
    the wrap module to close the course.
