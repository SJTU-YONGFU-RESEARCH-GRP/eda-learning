title: B*-tree floorplans
footer: learn_floorplanning — 03 bstar tree
slides:
- type: title
  title: B*-tree floorplans
  subtitle: B*-trees are a popular compacted floorplan representation
  notes: B*-trees are a popular compacted floorplan representation. Each node is a
    module. The left child sits to the right of its parent; the right child sits above—under
    the usual contour packing rules. From the tree you reconstruct coordinates without
    storing every x and y explicitly.
- type: bullets
  title: The idea
  bullets:
  - Root at the lower-left
  - Walking left children grows the packing rightward
  - Packing is typically done with a horizontal contour so y coordinates stay compacted
  - Perturbing the tree, rotate, move, swap, yields neighboring packings for annealing
    later
  notes: Root at the lower-left. Walking left children grows the packing rightward;
    right children grow upward along a contour of previously placed blocks. Packing
    is typically done with a horizontal contour so y coordinates stay compacted. Perturbing
    the tree—rotate, move, swap—yields neighboring packings for annealing later.
- type: bullets
  title: Browser lab track
  bullets:
  - Open **bstar-tree**
  - Load a starter tree over A–E
  - 'Step placement: parent, left child, right child'
  - Watch modules land left/right/above as the contour updates
  - Inspect outline legality and deadspace
  - Then code the same left/right packing rules
  notes: 'Open **bstar-tree**. Load a starter tree over A–E. Step placement: parent,
    left child, right child. Watch modules land left/right/above as the contour updates.
    Inspect outline legality and deadspace. Then code the same left/right packing
    rules.'
- type: bullets
  title: Implement track
  bullets:
  - Build a B*-tree for the tiny modules
  - Implement contour-based packing to emit (x, y, w, h)
  - Verify non-overlap and outline containment
  - Print the tree in a readable parenthesized form so goldens are reviewable
  - Prefer deterministic child ordering for tests
  notes: Build a B*-tree for the tiny modules. Implement contour-based packing to
    emit (x, y, w, h). Verify non-overlap and outline containment. Print the tree
    in a readable parenthesized form so goldens are reviewable. Prefer deterministic
    child ordering for tests.
- type: bullets
  title: Pitfalls
  bullets:
  - Getting left/right geometry backwards is the number-one bug
  - Contour updates that forget deleted segments leave modules floating or overlapping
  - Don’t confuse B*-tree adjacency with netlist adjacency
  notes: Getting left/right geometry backwards is the number-one bug. Contour updates
    that forget deleted segments leave modules floating or overlapping. Don’t confuse
    B*-tree adjacency with netlist adjacency—the tree is a packing code, not connectivity.
- type: bullets
  title: Your turn
  bullets:
  - Produce a legal B*-tree packing inside the outline
  - 'Next: sequence pairs, another classic encoding with positive and negative sequences'
  notes: 'Produce a legal B*-tree packing inside the outline. Next: sequence pairs—another
    classic encoding with positive and negative sequences.'
