title: B*-tree floorplan representation
footer: learn_floorplanning — 03 bstar tree
slides:
- type: title
  title: B*-tree floorplan representation
  subtitle: 'B-star stores packing adjacency: left child sits right-of the parent;
    right child sits above on a contour'
  notes: 'B-star stores packing adjacency: left child sits right-of the parent; right
    child sits above on a contour. Root A at the origin; left chain B then C then
    E; right child D above A.'
- type: bullets
  title: Pseudocode
  bullets:
  - B-star packing walks the tree with a contour
  - Left child sits to the right of the parent
  - Open this module's examples file and find the Pseudocode section
  - That written sketch is what you implement on the implement track and what the
    browser
  notes: 'B-star packing walks the tree with a contour. Left child sits to the right
    of the parent; right child sits above using the contour height.


    Open this module''s examples file and find the Pseudocode section. That written
    sketch is what you implement on the implement track and what the browser challenges
    measure.'
- type: bullets
  title: Algorithm sketch
  bullets:
  - Golden tree roots A at the origin
  - B’s x equals A’s right edge; D’s y is at least A’s height
  - The packing must stay legal in the outline
  notes: Golden tree roots A at the origin. B’s x equals A’s right edge; D’s y is
    at least A’s height. The packing must stay legal in the outline.
- type: code
  title: Algorithm sketch — try these
  code: 'INPUT: binary tree (left=right-of, right=above)

    OUTPUT: packed (x,y) via contour

    root at (0,0)

    left child: x ← parent.x + parent.w

    right child: y ← above parent (contour)

    update horizontal contour after each place

    GOLDEN: A@0,0; B.x=A.x+A.w; D.y≥A.h; legal'
  notes: ''
- type: image
  title: Root A at the origin
  image: assets/steps/01-root.png
  caption: Root A at the origin
  notes: B-star packing places the root at the lower left. A lands at zero comma zero
    with size three by two. Left children go right-of; right children go above via
    the contour.
- type: image
  title: Left chain B→C→E
  image: assets/steps/02-left-chain.png
  caption: Left chain B→C→E
  notes: 'The left spine walks rightward: B at x equals three, then C, then E. Contour
    heights track the skyline so later modules sit tightly.'
- type: image
  title: Right child D above A
  image: assets/steps/03-right-d.png
  caption: Right child D above A
  notes: D is the right child of A, so it packs above A on the contour. Its y is at
    least two—A's height—keeping the tree geometry honest.
- type: image
  title: Full B* pack is legal
  image: assets/steps/04-legal.png
  caption: Full B* pack is legal
  notes: All five modules are placed. The packing is legal inside ten by eight. Perturbing
    the tree—swap, rotate, move—will feed simulated annealing later.
- type: image
  title: B* is compact and mutable
  image: assets/steps/05-takeaway.png
  caption: B* is compact and mutable
  notes: B-star stores adjacency for packing, not connectivity. Get left and right
    semantics right, keep the contour correct, and you have a fast neighbor generator
    for search.
- type: bullets
  title: Browser lab track
  bullets:
  - Open bstar-tree and Pack B*-tree
  - Confirm A at zero comma zero, B at x equals three, D above A
  notes: Open bstar-tree and Pack B*-tree. Confirm A at zero comma zero, B at x equals
    three, D above A, and a legal five-module packing.
- type: bullets
  title: Implement track
  bullets:
  - Build the golden tree and contour-pack it
  - Assert A at (0,0), B.x equals A.x plus A.w, D.y at least A.h, and legality true
  notes: Build the golden tree and contour-pack it. Assert A at (0,0), B.x equals
    A.x plus A.w, D.y at least A.h, and legality true.
- type: bullets
  title: Pitfalls
  bullets:
  - Reversing left/right geometry; stale contour segments; treating the tree as a
    netlist
  notes: Reversing left/right geometry; stale contour segments; treating the tree
    as a netlist.
- type: bullets
  title: Your turn
  bullets:
  - Produce the legal B-star packing
  - 'Next: sequence-pair permutations as another encoding'
  notes: 'Produce the legal B-star packing. Next: sequence-pair permutations as another
    encoding.'
