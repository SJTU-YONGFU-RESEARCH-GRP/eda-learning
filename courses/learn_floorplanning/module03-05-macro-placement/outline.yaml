title: Hard macro / fixed-block placement
footer: learn_floorplanning — 05 macro placement
slides:
- type: title
  title: Hard macro / fixed-block placement
  subtitle: Macros are hard fixed rectangles
  notes: Macros are hard fixed rectangles. In macro mode, D is pinned at zero comma
    zero with macro true, size three by one. A stacks above; B, C, and E pack to the
    right—still legal.
- type: bullets
  title: Pseudocode
  bullets:
  - Macro placement locks hard blocks first
  - Free modules pack around those obstacles; legality fails if a macro drifts
  - Open this module's examples file and find the Pseudocode section
  - That written sketch is what you implement on the implement track and what the
    browser
  notes: 'Macro placement locks hard blocks first. Free modules pack around those
    obstacles; legality fails if a macro drifts.


    Open this module''s examples file and find the Pseudocode section. That written
    sketch is what you implement on the implement track and what the browser challenges
    measure.'
- type: bullets
  title: Algorithm sketch
  bullets:
  - Free golden has movable D at zero comma two
  - Macro teaching pack pins D at zero comma zero with macro true and the rest legal
  notes: Free golden has movable D at zero comma two. Macro teaching pack pins D at
    zero comma zero with macro true and the rest legal.
- type: code
  title: Algorithm sketch — try these
  code: 'INPUT: macros F locked (x,y), free modules

    OUTPUT: legal pack; macros never move

    place each f∈F at locked pose (macro flag)

    pack free modules around F obstacles

    fail if any macro drifts

    GOLDEN free: D@(0,2); macro: D@(0,0)'
  notes: ''
- type: image
  title: Free golden has movable D
  image: assets/steps/01-free.png
  caption: Free golden has movable D
  notes: In the free golden packing, D sits at zero comma two above A. Nothing is
    flagged as a hard macro yet.
- type: image
  title: Fix macro D at (0,0)
  image: assets/steps/02-fix-d.png
  caption: Fix macro D at (0,0)
  notes: Macro mode pins hard block D at the origin and marks it macro true. Soft
    and standard cells must pack around that fixed rectangle.
- type: image
  title: Pack A–E around the macro
  image: assets/steps/03-pack-rest.png
  caption: Pack A–E around the macro
  notes: A stacks above D; B, C, and E fill to the right. The macro packing differs
    from the free golden—D no longer sits at zero comma two.
- type: image
  title: Macro packing is legal
  image: assets/steps/04-legal.png
  caption: Macro packing is legal
  notes: 'Despite the fixed block, the packing stays legal: no overflow, no overlaps.
    Fixed macros constrain search but do not excuse illegality.'
- type: image
  title: Macros first, then cells
  image: assets/steps/05-takeaway.png
  caption: Macros first, then cells
  notes: Industrial flows often place large macros before standard cells. Treat fixed
    rectangles as hard constraints, then optimize the rest.
- type: bullets
  title: Browser lab track
  bullets:
  - Open macro-placement
  - 'Compare free golden D at zero comma two with Place macros: D at zero comma zero'
  - Confirm legality and the macro flag
  notes: 'Open macro-placement. Compare free golden D at zero comma two with Place
    macros: D at zero comma zero. Confirm legality and the macro flag.'
- type: bullets
  title: Implement track
  bullets:
  - Fix D, pack the rest, assert D at (0,0), D.macro true, and is_legal_packing true
  - Note the free golden differs
  notes: Fix D, pack the rest, assert D at (0,0), D.macro true, and is_legal_packing
    true. Note the free golden differs.
- type: bullets
  title: Pitfalls
  bullets:
  - Moving macros after fixing them
  notes: Moving macros after fixing them; shrinking macro size; allowing overlaps
    against the fixed block.
- type: bullets
  title: Your turn
  bullets:
  - Ship the legal macro packing
  - 'Next: hierarchical AB left and CDE right at offset five'
  notes: 'Ship the legal macro packing. Next: hierarchical AB left and CDE right at
    offset five.'
