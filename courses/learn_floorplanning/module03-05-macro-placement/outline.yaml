title: Hard macros
footer: learn_floorplanning — 05 macro placement
slides:
- type: title
  title: Hard macros
  subtitle: Hard macros are fixed-size blocks, memories, analog IP, pre-placed covers
  notes: Hard macros are fixed-size blocks—memories, analog IP, pre-placed covers.
    Sometimes their (x, y) is fixed too. Floorplanning must pack softer or movable
    modules around them without overlap and without leaving the outline. Treating
    macros as ordinary free rectangles loses the constraint.
- type: bullets
  title: The idea
  bullets:
  - 'Mark macros as hard: width and height immutable'
  - If position is fixed, lock (x, y) and forbid moves that shift them
  - Other modules pack in the remaining free space
  - Cost still includes overflow and deadspace
  - Legality checks apply unchanged, macros are just immovable obstacles
  notes: 'Mark macros as hard: width and height immutable. If position is fixed, lock
    (x, y) and forbid moves that shift them. Other modules pack in the remaining free
    space. Cost still includes overflow and deadspace; wirelength may prefer soft
    blocks near related macros. Legality checks apply unchanged—macros are just immovable
    obstacles.'
- type: bullets
  title: Browser lab track
  bullets:
  - Open **macro-placement**
  - Lock one module as a fixed hard block
  - Try to pack the others around it
  - Force an overlap and watch the checker
  - Unlock and compare freedom
  - Then encode fixed blocks in your Track A data model
  notes: Open **macro-placement**. Lock one module as a fixed hard block. Try to pack
    the others around it. Force an overlap and watch the checker. Unlock and compare
    freedom. Then encode fixed blocks in your Track A data model.
- type: bullets
  title: Implement track
  bullets:
  - 'Extend `tiny_modules.json` with a `fixed: true` and optional `x`, `y` on one
    module'
  - Pack the rest with your chosen representation, treating the macro as an obstacle
  - Fail loudly if a move would shift a fixed macro
  - Report legality and deadspace
  notes: 'Extend `tiny_modules.json` with a `fixed: true` and optional `x`, `y` on
    one module. Pack the rest with your chosen representation, treating the macro
    as an obstacle. Fail loudly if a move would shift a fixed macro. Report legality
    and deadspace.'
- type: bullets
  title: Pitfalls
  bullets:
  - Silently moving a “fixed” macro during SA is a trust-breaking bug
  - Also don’t shrink hard macros when soft sizing runs
  - Overlapping two macros at init means the instance is already illegal
  notes: Silently moving a “fixed” macro during SA is a trust-breaking bug. Also don’t
    shrink hard macros when soft sizing runs. Overlapping two macros at init means
    the instance is already illegal—detect that before search.
- type: bullets
  title: Your turn
  bullets:
  - Produce a legal packing with at least one fixed hard macro
  - 'Next: hierarchical floorplans that nest sub-packings inside parent regions'
  notes: 'Produce a legal packing with at least one fixed hard macro. Next: hierarchical
    floorplans that nest sub-packings inside parent regions.'
