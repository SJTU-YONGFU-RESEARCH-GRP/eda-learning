title: Soft module aspect sizing
footer: learn_floorplanning — 03 soft module sizing
slides:
- type: title
  title: Soft module aspect sizing
  subtitle: Soft module A keeps area six but may reshape between aspect one half and
    two
  notes: 'Soft module A keeps area six but may reshape between aspect one half and
    two. Reshape three by two into two by three, then pack legally—still area six.


    <!-- algorithm-walkthrough -->'
- type: image
  title: A is soft with area 6
  image: assets/steps/01-soft-a.png
  caption: A is soft with area 6
  notes: 'Module A is soft: area stays six, but aspect can move between one half and
    two. Hard modules B through E keep fixed shapes.'
- type: image
  title: Reshape A to 2×3
  image: assets/steps/02-reshape.png
  caption: Reshape A to 2×3
  notes: Reshape soft A to two by three—still area six. The soft packing moves neighbors
    so the outline stay legal.
- type: image
  title: Soft packing stays legal
  image: assets/steps/03-legal.png
  caption: Soft packing stays legal
  notes: After reshape, the soft packing remains legal inside ten by eight. Softness
    is not a license to overflow—legality still gates acceptance.
- type: image
  title: Hard vs soft views
  image: assets/steps/04-compare.png
  caption: Hard vs soft views
  notes: Compare the hard three-by-two golden with the soft two-by-three packing.
    Same area budget for A; different whitespace shape.
- type: image
  title: Softness is constrained freedom
  image: assets/steps/05-takeaway.png
  caption: Softness is constrained freedom
  notes: 'Soft modules trade aspect for packing quality under area and aspect bounds.
    Always re-check legality after a resize.


    <!-- /algorithm-walkthrough -->'
- type: bullets
  title: Browser lab track
  bullets:
  - Open soft-module-sizing
  - Show hard three-by-two, then Reshape A to two by three
  - Confirm area six and legality true on the soft packing
  notes: Open soft-module-sizing. Show hard three-by-two, then Reshape A to two by
    three. Confirm area six and legality true on the soft packing.
- type: bullets
  title: Implement track
  bullets:
  - Implement resize_soft that preserves area, then pack
  - Assert soft A ends at two by three with area six and a legal outline fit
  notes: Implement resize_soft that preserves area, then pack. Assert soft A ends
    at two by three with area six and a legal outline fit.
- type: bullets
  title: Pitfalls
  bullets:
  - Changing area when reshaping; ignoring aspect bounds; leaving hard modules soft
    by mistake
  notes: Changing area when reshaping; ignoring aspect bounds; leaving hard modules
    soft by mistake.
- type: bullets
  title: Your turn
  bullets:
  - Accept a legal soft packing with A at two by three
  - 'Next: fix macro D at the origin'
  notes: 'Accept a legal soft packing with A at two by three. Next: fix macro D at
    the origin.'
