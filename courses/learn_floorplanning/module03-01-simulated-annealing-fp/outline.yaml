- type: bullets
  title: Browser lab track
  bullets:
  - Open **simulated-annealing-fp**
  - Run a short anneal on the starter instance
  - Watch cost and temperature
  - Pause, inspect the current packing, then continue
  - Try a hotter start versus a greedy low temperature
  - Then implement a tiny SA loop yourself with a fixed seed
  notes: Open **simulated-annealing-fp**. Run a short anneal on the starter instance.
    Watch cost and temperature. Pause, inspect the current packing, then continue.
    Try a hotter start versus a greedy low temperature. Then implement a tiny SA loop
    yourself with a fixed seed.
- type: bullets
  title: Implement track
  bullets:
  - Wire SA around one representation
  - Log temperature, cost, and best packing
  - Use a deterministic RNG seed
  - Stop after a modest iteration budget on the toy outline
  - Export the best coordinates and deadspace
  notes: Wire SA around one representation. Log temperature, cost, and best packing.
    Use a deterministic RNG seed. Stop after a modest iteration budget on the toy
    outline—this is literacy, not overnight runs. Export the best coordinates and
    deadspace.
- type: bullets
  title: Pitfalls
  bullets:
  - Moves that don’t change the packing waste iterations
  - A cost that ignores overflow will “optimize” illegal layouts
  - Cooling too fast freezes a bad packing
  - Also don’t compare costs across different outline penalties without documenting
    the
  notes: Moves that don’t change the packing waste iterations. A cost that ignores
    overflow will “optimize” illegal layouts. Cooling too fast freezes a bad packing;
    cooling too slow teaches nothing on a five-module toy. Also don’t compare costs
    across different outline penalties without documenting the weights.
- type: bullets
  title: Your turn
  bullets:
  - Get SA to improve deadspace or wirelength proxy from a random start while staying
    legal
  - 'Next: soft modules, resize aspect under area constraints'
  notes: 'Get SA to improve deadspace or wirelength proxy from a random start while
    staying legal. Next: soft modules—resize aspect under area constraints.'
