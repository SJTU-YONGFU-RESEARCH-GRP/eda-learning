title: Simulated annealing search
footer: learn_floorplanning — 01 simulated annealing fp
slides:
- type: title
  title: Simulated annealing search
  subtitle: Representations give you a packing
  notes: Representations give you a packing. Search finds a good one under a fixed
    outline. Simulated annealing perturbs the representation—swap modules, rotate,
    change a tree edge or sequence—and accepts uphill moves early so you escape local
    minima. Cost usually mixes outline overflow, deadspace, and a wirelength proxy.
- type: bullets
  title: The idea
  bullets:
  - 'Pick a representation you already trust: slicing, B*, or sequence pair'
  - Define moves that stay in that encoding
  - At temperature T, accept worse costs with probability related to exp of minus
    delta over T
  - Cool on a schedule
  - Always re-pack and re-score after a move
  - Illegal overflow should cost heavily so the search prefers legal packings
  notes: 'Pick a representation you already trust: slicing, B*, or sequence pair.
    Define moves that stay in that encoding. At temperature T, accept worse costs
