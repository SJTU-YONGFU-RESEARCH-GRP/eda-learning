title: Hierarchical floorplanning
footer: learn_floorplanning — 01 hierarchical floorplan
slides:
- type: title
  title: Hierarchical floorplanning
  subtitle: Hierarchy packs cluster AB on the left and cluster CDE on the right with
    x offset five
  notes: 'Hierarchy packs cluster AB on the left and cluster CDE on the right with
    x offset five. Local pack, then place clusters—legal overall with clusters separated
    in x.


    <!-- algorithm-walkthrough -->'
- type: image
  title: 'Two clusters: AB and CDE'
  image: assets/steps/01-clusters.png
  caption: 'Two clusters: AB and CDE'
  notes: Hierarchy packs locally first. Left cluster holds A and B; right cluster
    holds C, D, and E. Each cluster is a mini-floorplan.
- type: image
  title: Left cluster packs at x<5
  image: assets/steps/02-left.png
  caption: Left cluster packs at x<5
  notes: AB occupies the left side with A at the origin and B at x equals three. Everything
    in this cluster stays left of x equals five.
- type: image
  title: Right cluster offsets by 5
  image: assets/steps/03-right.png
  caption: Right cluster offsets by 5
  notes: CDE packs in local coordinates, then shifts by five in x. C, D, and E all
    land at x greater than or equal to five—no cluster overlap.
- type: image
  title: Hierarchy is legal overall
  image: assets/steps/04-legal.png
  caption: Hierarchy is legal overall
  notes: 'Placing the two cluster bounding boxes yields a legal chip packing. Hierarchy
    scales: recurse inside clusters, then assemble.'
- type: image
  title: Hierarchy reuses the same engines
  image: assets/steps/05-takeaway.png
  caption: Hierarchy reuses the same engines
  notes: 'Each level can use slicing, B-star, or SA. The teaching golden is simply
    AB left and CDE right at offset five.


    <!-- /algorithm-walkthrough -->'
- type: bullets
  title: Browser lab track
  bullets:
  - Open hierarchical-floorplan and Pack hierarchy
  - Confirm A and B have x less than five, C D E have x at least five, and legality
    true
  notes: Open hierarchical-floorplan and Pack hierarchy. Confirm A and B have x less
    than five, C D E have x at least five, and legality true.
- type: bullets
  title: Implement track
  bullets:
  - Implement pack_hierarchical
  - Assert leftMax x+w is at most rightMin x, five modules present, and legality true
  notes: Implement pack_hierarchical. Assert leftMax x+w is at most rightMin x, five
    modules present, and legality true.
- type: bullets
  title: Pitfalls
  bullets:
  - Overlapping cluster bounding boxes
  notes: Overlapping cluster bounding boxes; forgetting the offset; applying different
    legality rules at each level.
- type: bullets
  title: Your turn
  bullets:
  - Accept the AB | CDE packing
  - 'Next: assign pins P0 through P3 on all four outline sides'
  notes: 'Accept the AB | CDE packing. Next: assign pins P0 through P3 on all four
    outline sides.'
