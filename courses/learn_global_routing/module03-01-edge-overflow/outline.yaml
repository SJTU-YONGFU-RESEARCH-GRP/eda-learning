- type: bullets
  title: Implement track
  bullets:
  - Implement `edge_overflow(usage, capacity)`
  - Call route_nets with mode l_hv on tiny_gr and assert total overflow is greater
    than zero
  notes: Implement `edge_overflow(usage, capacity)`. Call route_nets with mode l_hv
    on tiny_gr and assert total overflow is greater than zero.
- type: bullets
  title: Pitfalls
  bullets:
  - Computing overflow before summing all nets
  - Using tile demand from congestion instead of edge usage
  - Reporting negative overflow values
  notes: Computing overflow before summing all nets. Using tile demand from congestion
    instead of edge usage. Reporting negative overflow values.
- type: bullets
  title: Your turn
  bullets:
