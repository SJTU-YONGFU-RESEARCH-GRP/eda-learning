title: When usage exceeds capacity
footer: learn_global_routing — 01 edge overflow
slides:
- type: title
  title: When usage exceeds capacity
  subtitle: Each GCell edge has capacity two on tiny_gr
  notes: Each GCell edge has capacity two on tiny_gr. Every routed net deposits plus
    one on each edge it uses. Overflow is how far usage exceeds capacity—summed, maxed,
    and counted per edge.
- type: bullets
  title: The idea
  bullets:
  - For each edge e, overflow e equals max of zero and usage e minus capacity
  - Total is the sum across edges
  - Max is the worst edge
  - Count is how many edges have positive overflow
  - Sequential L-HV on all six nets should yield positive total overflow at cap two
  notes: For each edge e, overflow e equals max of zero and usage e minus capacity.
    Total is the sum across edges. Max is the worst edge. Count is how many edges
    have positive overflow. Sequential L-HV on all six nets should yield positive
    total overflow at cap two.
