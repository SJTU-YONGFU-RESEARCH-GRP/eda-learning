title: Pins become terminals
footer: learn_global_routing — 03 terminal gcells
slides:
- type: title
  title: Pins become terminals
  subtitle: A global route starts and ends at GCell terminals, one tile per pin
  notes: A global route starts and ends at GCell terminals—one tile per pin. Legal
    placement gives you x y coordinates; this module converts them to grid indices
    using the same floor-and-clamp rule as congestion GCells.
- type: bullets
  title: The idea
  bullets:
  - Cell_gcell of x y returns column i equals floor of x over cell width clamped
  - Cell A at one comma one maps to zero comma zero
  - Cell D at eight comma five maps to two comma one
  - Build a dictionary from cell id to GCell for every pin in the netlist
  notes: cell_gcell of x y returns column i equals floor of x over cell width clamped,
    and row j likewise. Cell A at one comma one maps to zero comma zero. Cell D at
    eight comma five maps to two comma one. Build a dictionary from cell id to GCell
    for every pin in the netlist.
- type: image
  title: Pin → GCell
  image: assets/steps/01-map.png
  caption: Pin → GCell
  notes: Cell centers map to GCells with floor(x/cellW), floor(y/cellH).
- type: image
  title: A → (0,0)
  image: assets/steps/02-a00.png
  caption: A → (0,0)
  notes: Spread A at (1,1) lands in GCell (0,0).
- type: image
  title: D → (2,1)
  image: assets/steps/03-d21.png
  caption: D → (2,1)
  notes: D at (8,5) → (2,1) top row.
- type: image
  title: Routes on graph
  image: assets/steps/04-route.png
  caption: Routes on graph
  notes: Global routes walk GCell edges between terminal tiles.
- type: image
  title: Cluster seed
  image: assets/steps/05-cluster.png
  caption: Cluster seed
  notes: Tight cluster maps many pins to one GCell—zero-length routes.
- type: image
  title: Browser lab track
  image: assets/lab-starter.png
  caption: Browser lab starter
  notes: Open **terminal-gcells**. Hover each cell and read its terminal GCell. Move
    a pin across a boundary and watch the terminal index flip. Confirm the six cells
    on tiny_gr match your Track A printout.
- type: bullets
  title: Implement track
  bullets:
  - Implement `terminals(positions, data)` returning the map
  - Assert A through F on spread placement
  - Print terminals before any routing lab
  notes: Implement `terminals(positions, data)` returning the map. Assert A through
    F on spread placement. Print terminals before any routing lab.
- type: bullets
  title: Pitfalls
  bullets:
  - Using cell origin instead of pin center
  - Off-by-one at the right or top chip edge without clamp
  - Mixing site columns from legalization with GCell columns
  notes: Using cell origin instead of pin center. Off-by-one at the right or top chip
    edge without clamp. Mixing site columns from legalization with GCell columns.
- type: bullets
  title: Your turn
  bullets:
  - Complete terminals for all six cells
  - 'Next: L-shape pattern routes between two terminals'
  notes: 'Complete terminals for all six cells. Next: L-shape pattern routes between
    two terminals.'
