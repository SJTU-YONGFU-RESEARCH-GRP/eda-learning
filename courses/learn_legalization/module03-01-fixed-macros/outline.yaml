title: Fixed macros
footer: learn_legalization — 01 fixed macros
slides:
- type: title
  title: Fixed macros
  subtitle: Macro D is locked at (8, 4) on the top row, width two blocks sites eight
    and nine
  notes: 'Macro D is locked at (8, 4) on the top row—width two blocks sites eight
    and nine. Run Abacus with fixed macros: D never moves, movables pack around the
    obstacle, and the run stays legal with displacement four on this instance.'
- type: bullets
  title: The idea
  bullets:
  - Fixed cells are placed first; occupied intervals block shelf and Abacus trials
    on that row
  - Legality adds a macro check, any drift off the lock fails
  - Movable cells must route around macro sites, not slide through them
  - <!-- algorithm-walkthrough -->
  notes: 'Fixed cells are placed first; occupied intervals block shelf and Abacus
    trials on that row. Legality adds a macro check—any drift off the lock fails.
    Movable cells must route around macro sites, not slide through them.


    <!-- algorithm-walkthrough -->'
- type: image
  title: Macro D locked at (8, 4)
  image: assets/steps/01-d-locked.png
  caption: Macro D locked at (8, 4)
  notes: Cell D is a fixed macro at (8, 4) on the top row—width two covers sites eight
    and nine. Every legalizer must leave D untouched while packing movables around
    it.
- type: image
  title: Abacus with fixed macros
  image: assets/steps/02-abacus-fixed.png
  caption: Abacus with fixed macros
  notes: 'Run Abacus with the fixed map: D is placed first, occupied sites on row
    four block C from sliding into the macro. Movable cells trial rows respecting
    blocked intervals.'
- type: image
  title: D never moves
  image: assets/steps/03-d-never-moves.png
  caption: D never moves
  notes: After Abacus with fixed macros, D remains at (8, 4). Legality report includes
    a macro check—any drift off the lock fails the run.
- type: image
  title: Still legal, displacement 4
  image: assets/steps/04-still-legal.png
  caption: Still legal, displacement 4
  notes: With D fixed, Abacus still legalizes A, B, C, E, and F with total displacement
    four—the same as the unconstrained Abacus run on this instance because D never
    moved in either.
- type: image
  title: Movables avoid macro sites
  image: assets/steps/05-avoid-macro.png
  caption: Movables avoid macro sites
  notes: 'C lands on row four at x four—left of E at zero, right of the macro gap.
    Packing algorithms must treat fixed macros as obstacles, not soft preferences.


    <!-- /algorithm-walkthrough -->'
- type: bullets
  title: Browser lab track
  bullets:
  - In the browser lab track, open the **fixed-macros** lab from the tools shelf
  - Load the overlap or float starter, run the legalizer once
  - Work the challenges that lock the goldens
  notes: In the browser lab track, open the **fixed-macros** lab from the tools shelf.
    Load the overlap or float starter, run the legalizer once, and read legality plus
    displacement and HPWL when the panel shows them. Work the challenges that lock
    the goldens, then come back to implement the same loop yourself.
- type: bullets
  title: Implement track
  bullets:
  - In the implement track, open this module's examples and the course `common/` solvers
  - Parse `tiny_legal.json`, run the algorithm with deterministic coordinates
  - Match the browser goldens before you claim the checklist
  notes: In the implement track, open this module's examples and the course `common/`
    solvers. Parse `tiny_legal.json`, run the algorithm with deterministic coordinates,
    and print legality, displacement, and HPWL. Match the browser goldens before you
    claim the checklist.
- type: bullets
  title: Pitfalls
  bullets:
  - Common traps
  notes: 'Common traps: assuming snap alone legalizes; forgetting site width when
    checking overlap; ignoring fixed macro D at (8, 4); reporting HPWL without legality;
    and comparing Abacus and Tetris without naming displacement versus wirelength
    tradeoffs.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - Implement until your metrics match the starter goldens
  - When you're ready, take the short quiz, then continue to the next module
  notes: Complete the checklist for at least one track—preferably both. Implement
