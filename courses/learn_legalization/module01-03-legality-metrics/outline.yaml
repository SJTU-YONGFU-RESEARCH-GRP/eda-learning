title: Legality metrics
footer: learn_legalization — 03 legality metrics
slides:
- type: title
  title: Legality metrics
  subtitle: Before you celebrate wirelength, ask whether the placement is legal
  notes: Before you celebrate wirelength, ask whether the placement is legal. On the
    overlap seed the checker fails with overlap A/B—three cells share the middle row
    at x four. The golden reference passes with reason ok.
- type: bullets
  title: The idea
  bullets:
  - Check on-row placement, site alignment, in-chip bounds, and pairwise overlap
  - Report displacement as L1 Manhattan distance from the origin layout
  - Pair legality with HPWL after legalize
  notes: Check on-row placement, site alignment, in-chip bounds, and pairwise overlap.
    Report displacement as L1 Manhattan distance from the origin layout—Abacus moves
    four total units on this instance, overlap removal moves six. Pair legality with
    HPWL after legalize.
- type: bullets
  title: Pseudocode
  bullets:
  - Before you trust wirelength, write a legality checker in pseudocode
  - Inputs are coordinates and widths
  - The loop walks cells and pairs
  - The stop condition is the first failure reason, or ok when every check passes
  - Open this module's examples file and find the Pseudocode section
  - That written sketch is what you implement on the implement track and what the
    browser
  notes: 'Before you trust wirelength, write a legality checker in pseudocode. Inputs
    are coordinates and widths. The loop walks cells and pairs. The stop condition
    is the first failure reason—or ok when every check passes.


    Open this module''s examples file and find the Pseudocode section. That written
    sketch is what you implement on the implement track and what the browser challenges
    measure.'
- type: bullets
  title: Algorithm sketch
  bullets:
  - The sketch also defines the metrics you report after a legalize pass
  - On the overlap seed the checker fails with overlap A/B; the golden packing returns
    ok
  notes: 'The sketch also defines the metrics you report after a legalize pass: L1
    displacement from the origin layout, and HPWL from cell centers. On the overlap
    seed the checker fails with overlap A/B; the golden packing returns ok.'
- type: code
  title: Algorithm sketch — try these
  code: "INPUT: positions, widths, chip, optional fixed\nOUTPUT: legal?, reason, disp,\
    \ HPWL\nfor each cell c:\n  fail if off-site, off-row, outside, or macro moved\n\
    for each same-row pair (a,b):\n  fail if [x,x+w) intervals overlap\ndisp = Σ|Δx|+|Δy|;\
    \ HPWL = Σ net bbox (centers)\nGOLDEN: overlap → \"overlap A/B\"; golden → \"\
    ok\""
  notes: ''
- type: image
  title: Overlap seed is illegal
  image: assets/steps/01-overlap-illegal.png
  caption: Overlap seed is illegal
  notes: Starting from the overlap placement, the checker reports overlap A/B first—three
    cells share the middle row at x equals four. That single reason is enough to fail
    legality.
- type: image
  title: Four legality checks
  image: assets/steps/02-checks.png
  caption: Four legality checks
  notes: A legal placement must be on-row, site-aligned, inside the chip, and overlap-free.
    Fixed macros add a fifth check later—did the macro move off its lock?
- type: image
  title: Golden placement passes
  image: assets/steps/03-golden-ok.png
  caption: Golden placement passes
  notes: 'The golden reference satisfies every check: reason ok, legal true. Use it
    as the positive control when you unit-test your legality reporter.'
- type: image
  title: 'Displacement: L1 from origin'
  image: assets/steps/04-displacement.png
  caption: 'Displacement: L1 from origin'
  notes: Displacement sums Manhattan distance per cell from a reference layout—here
    the overlap seed. Abacus later moves cells only four total units; overlap removal
    moves six.
- type: image
  title: HPWL after legalize
  image: assets/steps/05-hpwl-after.png
  caption: HPWL after legalize
  notes: 'Wirelength still matters: Abacus lands at HPWL thirty-eight with displacement
    four; Tetris-style packing hits HPWL thirty-two with displacement six. Always
    pair legality with both metrics.'
- type: bullets
  title: Browser lab track
  bullets:
  - In the browser lab track, open the **legality-metrics** lab from the tools shelf
  - Open the interactive lab
  - Reveal golden is study-only
  - Work the challenges that lock the goldens
  notes: In the browser lab track, open the **legality-metrics** lab from the tools
    shelf. Open the interactive lab, place or snap cells on the site and row grid—or
    use an Apply helper—then Check. Reveal golden is study-only. Work the challenges
    that lock the goldens, then come back to implement the same loop yourself.
- type: bullets
  title: Implement track
  bullets:
  - In the implement track
  - Parse `tiny_legal.json`, run the algorithm with deterministic coordinates
  - Match the browser goldens before you claim the checklist
  notes: In the implement track, open this module's EXAMPLES.md Pseudocode section
    and the course common solvers. Parse `tiny_legal.json`, run the algorithm with
    deterministic coordinates, and print legality, displacement, and HPWL. Match the
    browser goldens before you claim the checklist.
- type: bullets
  title: Pitfalls
  bullets:
  - Common traps
  notes: 'Common traps: assuming snap alone legalizes; forgetting site width when
    checking overlap; ignoring fixed macro D at (8, 4); reporting HPWL without legality;
    and comparing Abacus and Tetris without naming displacement versus wirelength
    tradeoffs.'
- type: bullets
  title: Your turn
  bullets:
  - Complete the checklist for at least one track, preferably both
  - Implement until your metrics match the starter goldens
  - When you're ready, take the short quiz, then continue to the next module
  notes: Complete the checklist for at least one track—preferably both. Implement
    until your metrics match the starter goldens. When you're ready, take the short
    quiz, then continue to the next module.
